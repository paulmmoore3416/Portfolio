# Netlify Configuration
# Optimized settings for Paul Moore Portfolio

[build]
  publish = "."
  command = "echo 'No build required - static site'"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "http://paulmmoore.com/*"
  to = "https://paulmmoore.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.paulmmoore.com/*"
  to = "https://paulmmoore.com/:splat"
  status = 301
  force = true

# Form handling (if you want to use Netlify Forms)
# Uncomment to enable
# [[plugins]]
#   package = "@netlify/plugin-forms"